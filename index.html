<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio de Mathéis Monchatre - Développeur web passionné par la création de sites modernes et dynamiques. Étudiant en BUT MMI à l'IUT de Blois.">
    <meta name="keywords" content="développeur web, portfolio, HTML, CSS, JavaScript, Vue.js, PHP, Laravel, web developer">
    <meta name="author" content="Mathéis Monchatre">
    <meta property="og:title" content="Portfolio Mathéis Monchatre">
    <meta property="og:description" content="Développeur web passionné - Découvrez mes projets et compétences">
    <meta property="og:type" content="website">
    
    <title>Mathéis Monchatre | Développeur Web</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./img/mm-logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./modal.css">
</head>
<body>
    <!-- Canevas Three.js -->
    <canvas id="threejs-canvas"></canvas>

    <div class="content-wrapper">
        <!-- NAVIGATION (générée dynamiquement) -->
        <nav id="mainNav">
            <!-- Contenu généré par JS -->
        </nav>

        <!-- Effets de fond -->
        <div class="raindrop-impacts"></div>

        <!-- PRESENTATION (générée dynamiquement) -->
        <section id="presentation" class="presentation">
            <!-- Contenu généré par JS -->
        </section>

        <!-- COMPÉTENCES (générées dynamiquement) -->
        <section id="competences" class="competences">
            <!-- Contenu généré par JS -->
        </section>

         <!-- DIPLÔMES (générée dynamiquement) -->
        <section id="diplomes" class="diplomes">
            <!-- Contenu généré par JS -->
        </section>

        <!-- EXPÉRIENCE (générée dynamiquement) -->
        <section id="experience" class="experience">
            <!-- Contenu généré par JS -->
        </section>

       
        <!-- RÉALISATIONS (générées dynamiquement) -->
        <section id="realisations">
            <div class="section-header">
                <h2 data-fr="Réalisations" data-en="Projects" id="realisations-title">Réalisations</h2>
                <p data-fr="Découvrez mes derniers projets" data-en="Discover my latest projects" id="realisations-subtitle">Découvrez mes derniers projets</p>
            </div>
            <div id="filtre"></div>
            <!-- Contenu généré par JS -->
        </section>

        <!-- CONTACT (généré dynamiquement) -->
        <section id="contact" class="contact">
            <!-- Contenu généré par JS -->
        </section>

        <!-- FLECHE RETOUR HAUT -->
        <button id="scrollTop" aria-label="Retour en haut">
            <i class="bi bi-arrow-up"></i>
        </button>
    </div>

    <!-- MODAL PROJET -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-container">
            <button class="modal-close" id="modalClose">
                <i class="bi bi-x-lg"></i>
            </button>
            <div class="modal-content" id="modalContent">
                <!-- Contenu généré dynamiquement -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./data.js"></script>
    <script src="./script.js"></script>
</body>
</html>
